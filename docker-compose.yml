# Para levantar solo Laravel + Postgres + Redis: docker compose up app postgres redis
# Horizon y Reverb requieren instalar laravel/horizon y laravel/reverb si los necesitas.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: services-fields-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:8000"
    environment:
      APP_NAME: "${APP_NAME:-Services Fields}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY:-}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-http://localhost:8000}"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-services_fields}"
      DB_USERNAME: "${DB_USERNAME:-services_fields}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      RUN_MIGRATE: "true"
      REVERB_APP_ID: "${REVERB_APP_ID:-services_fields}"
      REVERB_APP_KEY: "${REVERB_APP_KEY:-services-fields-key}"
      REVERB_APP_SECRET: "${REVERB_APP_SECRET:-services-fields-secret}"
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      # URL que el navegador debe usar (localhost, no "reverb")
      REVERB_PUBLIC_HOST: "${REVERB_PUBLIC_HOST:-localhost}"
      REVERB_PUBLIC_PORT: "${REVERB_PUBLIC_PORT:-8080}"
      REVERB_PUBLIC_SCHEME: "${REVERB_PUBLIC_SCHEME:-http}"
    volumes:
      - storage_data:/var/www/html/storage
      # Montar código local: los cambios se ven en el contenedor sin reconstruir
      - .:/var/www/html
      # Volúmenes con nombre: persisten entre "docker compose down" y "up" (no hace falta npm install de nuevo)
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - services_fields

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: services-fields-horizon
    restart: unless-stopped
    command: php artisan horizon
    environment:
      APP_NAME: "${APP_NAME:-Services Fields}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY:-}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-http://localhost:8000}"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-services_fields}"
      DB_USERNAME: "${DB_USERNAME:-services_fields}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
    volumes:
      - storage_data:/var/www/html/storage
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - services_fields

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: services-fields-reverb
    restart: unless-stopped
    command: sh -c "rm -f bootstrap/cache/config.php 2>/dev/null; php artisan config:clear && php artisan reverb:start --host=0.0.0.0 --port=8080"
    ports:
      - "${REVERB_PORT:-8080}:8080"
    environment:
      APP_NAME: "${APP_NAME:-Services Fields}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY:-}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-http://localhost:8000}"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-services_fields}"
      DB_USERNAME: "${DB_USERNAME:-services_fields}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REVERB_APP_ID: services_fields
      REVERB_APP_KEY: services-fields-key
      REVERB_APP_SECRET: services-fields-secret
      REVERB_SERVER_HOST: "0.0.0.0"
      REVERB_SERVER_PORT: "8080"
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - services_fields

  redis:
    image: redis:7-alpine
    container_name: services-fields-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - services_fields

  postgres:
    image: postgres:16-alpine
    container_name: services-fields-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_DATABASE:-services_fields}"
      POSTGRES_USER: "${DB_USERNAME:-services_fields}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - services_fields

volumes:
  postgres_data:
  redis_data:
  storage_data:
  vendor_data:
  node_modules_data:

networks:
  services_fields:
    driver: bridge
